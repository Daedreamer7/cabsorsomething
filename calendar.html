<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="/src/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Concepts Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .calendar-day {
            min-height: 120px;
        }
        .calendar-event {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .calendar-event:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Header (Same as dashboard.html) -->
    <header class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <!-- ... (Copy header content from dashboard.html) ... -->
    </header>

    <!-- Sidebar (Same as dashboard.html) -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-64 bg-white shadow-sm pt-20">
        <!-- ... (Copy sidebar content from dashboard.html) ... -->
    </aside>

    <!-- Main Content -->
    <main class="ml-64 pt-20">
        <div class="p-6 space-y-6">
            <!-- Calendar Header -->
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold text-gray-900">Calendar</h1>
                    <button class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        <i class="fas fa-plus mr-2"></i>Add Event
                    </button>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex space-x-2">
                        <button class="nav-btn prev" title="Previous Month" aria-label="Go to Previous Month">
                            <i class="fas fa-chevron-left" aria-hidden="true"></i>
                        </button>
                        <button class="nav-btn next" title="Next Month" aria-label="Go to Next Month">
                            <i class="fas fa-chevron-right" aria-hidden="true"></i>
                        </button>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">January 2024</h2>
                    <select id="calendarView" name="calendarView" title="Calendar View" aria-label="Select Calendar View">
                        <option value="month">Month</option>
                        <option value="week">Week</option>
                        <option value="day">Day</option>
                        <option value="list">List</option>
                    </select>
                </div>
            </div>

            <!-- Calendar Grid -->
            <div class="bg-white rounded-xl shadow-sm">
                <!-- Days of Week -->
                <div class="grid grid-cols-7 gap-px bg-gray-200">
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Sun</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Mon</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Tue</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Wed</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Thu</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Fri</div>
                    <div class="bg-white p-4 text-sm font-semibold text-gray-900 text-center">Sat</div>
                </div>

                <!-- Calendar Days -->
                <div class="grid grid-cols-7 gap-px bg-gray-200">
                    <!-- Previous Month -->
                    <div class="bg-white p-2 calendar-day">
                        <span class="text-gray-400">31</span>
                    </div>

                    <!-- Current Month -->
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">1</span>
                        <div class="mt-2 space-y-1">
                            <div class="calendar-event bg-blue-100 text-blue-800 text-xs p-1 rounded">
                                9:00 AM - Client Meeting
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">2</span>
                        <div class="mt-2 space-y-1">
                            <div class="calendar-event bg-green-100 text-green-800 text-xs p-1 rounded">
                                2:00 PM - Project Review
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">3</span>
                    </div>
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">4</span>
                        <div class="mt-2 space-y-1">
                            <div class="calendar-event bg-purple-100 text-purple-800 text-xs p-1 rounded">
                                11:00 AM - Team Sync
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">5</span>
                    </div>
                    <div class="bg-white p-2 calendar-day">
                        <span class="font-medium">6</span>
                    </div>

                    <!-- Repeat for remaining days -->
                    <!-- ... -->
                </div>
            </div>

            <!-- Upcoming Events -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Upcoming Events</h2>
                <div class="space-y-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-900">Client Meeting - ABC Corp</h3>
                            <p class="text-xs text-gray-500">Today, 9:00 AM</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-900">Project Review</h3>
                            <p class="text-xs text-gray-500">Today, 2:00 PM</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-900">Team Sync</h3>
                            <p class="text-xs text-gray-500">Tomorrow, 11:00 AM</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Sidebar Toggle (Same as dashboard.html)
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('main');
        let sidebarOpen = true;

        menuToggle.addEventListener('click', () => {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.width = '256px';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.width = '0';
                mainContent.style.marginLeft = '0';
            }
        });
    </script>
</body>
</html>
